<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSD | Digital Asset Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff88; --bg: #020617; --card: #0f172a; --text: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 80px; }

        /* Header / Wallet Info */
        .header { padding: 30px 20px; background: linear-gradient(180deg, #1e293b 0%, #020617 100%); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .wallet-label { font-size: 0.75rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
        .balance { font-size: 2.2rem; font-weight: 700; margin: 5px 0; color: var(--primary); }
        .sub-balance { font-size: 0.9rem; opacity: 0.8; }

        /* Action Buttons */
        .actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px; margin-top: -30px; }
        .action-item { background: var(--card); padding: 15px 10px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .action-icon { font-size: 1.2rem; margin-bottom: 5px; display: block; }
        .action-label { font-size: 0.65rem; font-weight: 600; opacity: 0.8; }

        /* Market Cards */
        .section-label { padding: 20px 20px 10px; font-size: 0.85rem; font-weight: 600; color: var(--primary); }
        .market-card { background: var(--card); margin: 0 20px 15px; padding: 18px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .coin-info { display: flex; align-items: center; gap: 12px; }
        .coin-icon { width: 35px; height: 35px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; }
        
        .chart-mini { width: 60px; height: 30px; border-bottom: 2px solid var(--primary); opacity: 0.5; }
        
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-link { color: #94a3b8; text-decoration: none; text-align: center; font-size: 0.6rem; }
        .nav-link.active { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>

    <div class="header">
        <p class="wallet-label">Total Portfolio Value</p>
        <h1 class="balance">₹0.00</h1>
        <p class="sub-balance">0.0000 BUSD <span style="color: var(--primary);">+0.0%</span></p>
    </div>

    <div class="actions">
        <div class="action-item" onclick="location.href='p2p.html'">
            <span class="action-icon">📥</span>
            <span class="action-label">Deposit</span>
        </div>
        <div class="action-item">
            <span class="action-icon">📤</span>
            <span class="action-label">Withdraw</span>
        </div>
        <div class="action-item">
            <span class="action-icon">🔄</span>
            <span class="action-label">Swap</span>
        </div>
        <div class="action-item">
            <span class="action-icon">📊</span>
            <span class="action-label">Trade</span>
        </div>
    </div>

    <div class="section-label">MARKET ASSETS</div>
    
    <div class="market-card">
        <div class="coin-info">
            <div class="coin-icon" style="background: var(--primary);">B</div>
            <div>
                <h4 style="font-size: 0.9rem;">Bharat USD</h4>
                <p style="font-size: 0.7rem; opacity: 0.5;">BUSD / INR</p>
            </div>
        </div>
        <div class="chart-mini"></div>
        <div style="text-align: right;">
            <p style="font-size: 0.9rem; font-weight: 700;">₹0.90</p>
            <p style="font-size: 0.65rem; color: var(--primary);">+0.12%</p>
        </div>
    </div>

    <div class="market-card">
        <div class="coin-info">
            <div class="coin-icon" style="background: #f7931a; color: #fff;">₿</div>
            <div>
                <h4 style="font-size: 0.9rem;">Bitcoin</h4>
                <p style="font-size: 0.7rem; opacity: 0.5;">BTC / INR</p>
            </div>
        </div>
        <div class="chart-mini" style="border-color: #f7931a;"></div>
        <div style="text-align: right;">
            <p style="font-size: 0.9rem; font-weight: 700;">₹62,45,000</p>
            <p style="font-size: 0.65rem; color: #f7931a;">-1.5%</p>
        </div>
    </div>

    <div class="section-label">UTILITY GATEWAY</div>
    <div style="padding: 0 20px;">
        <div style="background: rgba(0,255,136,0.05); border: 1px dashed var(--primary); padding: 15px; border-radius: 12px; font-size: 0.75rem; text-align: center;">
            🚀 <b>BUSD Pay:</b> Scan any Merchant QR to pay directly from your wallet.
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link active">🏠<br>Home</a>
        <a href="#" class="nav-link">📉<br>Markets</a>
        <a href="p2p.html" class="nav-link">🔄<br>P2P</a>
        <a href="#" class="nav-link">👤<br>Account</a>
    </nav>

</body>
</html>
