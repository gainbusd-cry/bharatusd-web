<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSD | Official</title>
    <style>
        body { background: #010409; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .nav { background: #0a0d12; padding: 15px; border-bottom: 1px solid #333; font-weight: bold; color: #00ff88; }
        .page { padding: 20px; display: none; }
        .active { display: block; }
        .card { background: #0d1117; border: 1px solid #30363d; border-radius: 15px; padding: 20px; margin: 15px 0; }
        .btn { background: #00ff88; color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; }
        .footer { position: fixed; bottom: 0; width: 100%; display: flex; background: #0a0d12; border-top: 1px solid #333; padding: 10px 0; }
        .tab { flex: 1; color: #888; font-size: 12px; cursor: pointer; }
        .tab.on { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>

<div class="nav">BUSD PROTOCOL</div>

<div id="home" class="page active">
    <h1>BUSD Utility Asset</h1>
    <div class="card">
        <p>Supply: 1,000,000,000</p>
        <p>Rate: ₹0.90 / BUSD</p>
    </div>
    <button class="btn" onclick="go('buy')">BUY BUSD (P2P)</button>
</div>

<div id="buy" class="page">
    <div id="s1">
        <h3>Step 1: Wallet Info</h3>
        <input type="text" id="w" placeholder="Wallet Address">
        <input type="number" id="a" placeholder="Amount INR" oninput="c()">
        <p>You get: <span id="r">0</span> BUSD</p>
        <button class="btn" onclick="pay()">NEXT: PAY NOW</button>
    </div>
    <div id="s2" style="display:none;">
        <h3>Step 2: Payment</h3>
        <img id="qr" src="" style="width:180px; margin:15px; border-radius:10px;">
        <p style="color:#00ff88;">UPI: Bharatbusd@postbank</p>
        <input type="text" id="utr" placeholder="Enter UTR Number">
        <button class="btn" onclick="done()">SUBMIT UTR</button>
    </div>
</div>

<div class="footer">
    <div class="tab on" id="th" onclick="go('home')">🏠<br>Info</div>
    <div class="tab" id="tb" onclick="go('buy')">🔄<br>Buy</div>
</div>

<script>
    function go(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
        if(id=='home') document.getElementById('th').classList.add('on');
        if(id=='buy') document.getElementById('tb').classList.add('on');
    }
    function c() {
        let v = document.getElementById('a').value;
        document.getElementById('r').innerText = v ? Math.floor(v/0.9) : '0';
    }
    function pay() {
        let amt = document.getElementById('a').value;
        if(amt < 100) { alert('Min ₹100'); return; }
        let url = "upi://pay?pa=Bharatbusd@postbank&pn=BUSD_TEAM&am=" + amt + "&cu=INR";
        document.getElementById('qr').src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(url);
        document.getElementById('s1').style.display = 'none';
        document.getElementById('s2').style.display = 'block';
    }
    function done() {
        alert('Order Submitted! Verifying...');
        location.reload();
    }
</script>

</body>
</html>
