<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUSD | Institutional Asset Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff88; --bg: #010409; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08); --gold: #FFD700; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; padding-bottom: 100px; background-image: radial-gradient(circle at top, #002213 0%, #010409 60%); min-height: 100vh; overflow-x: hidden; }
        nav { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(1,4,9,0.95); backdrop-filter: blur(15px); position: sticky; top: 0; border-bottom: 1px solid var(--border); z-index: 1000; }
        .page-section { display: none; padding: 20px; animation: fadeIn 0.3s ease-in; }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .btn-action { background: var(--primary); color: #000; padding: 16px; border-radius: 14px; border: none; font-weight: 800; width: 100%; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; font-size: 1rem; outline: none; }
        .spec-table { width: 100%; border-collapse: collapse; }
        .spec-table td { padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .val { text-align: right; font-weight: 700; color: var(--primary); }
        .qr-placeholder { background: #fff; padding: 15px; border-radius: 15px; width: 180px; margin: 20px auto; }
        .footer-tabs { position: fixed; bottom: 0; left: 0; width: 100%; background: #010409; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .tab-btn { background: none; border: none; color: #fff; font-size: 0.7rem; opacity: 0.4; text-align: center; cursor: pointer; flex: 1; outline: none; }
        .tab-btn.active { opacity: 1; color: var(--primary); font-weight: 800; }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight:800; color:var(--primary);">BUSD PROTOCOL</div>
        <div style="font-size: 0.6rem; opacity: 0.5;">BY BUSD TEAM</div>
    </nav>

    <main id="home-page" class="page-section active">
        <h1 style="font-size: 2.2rem; font-weight: 800; margin-bottom: 10px;">Institutional <br>Asset Gateway</h1>
        <div class="card">
            <h3 style="color: var(--primary); font-size: 0.9rem; margin-bottom: 15px;">TOKENOMICS & SPECS</h3>
            <table class="spec-table">
                <tr><td style="opacity:0.5;">Total Supply</td><td class="val">1,000,000,000 BUSD</td></tr>
                <tr><td style="opacity:0.5;">Buy Rate</td><td class="val">₹0.90 / BUSD</td></tr>
                <tr><td style="opacity:0.5;">Burn System</td><td class="val">₹0.10 Per Transaction</td></tr>
            </table>
        </div>
        <button class="btn-action" onclick="switchPage('p2p-page')">BUY BUSD (P2P)</button>
    </main>

    <main id="p2p-page" class="page-section">
        <div id="step-1" class="card">
            <h3 style="margin-bottom: 15px;">1. Purchase Details</h3>
            <input type="text" id="wallet-addr" placeholder="Wallet Address (0x...)">
            <input type="number" id="inr-amt" placeholder="Amount INR" oninput="calcCoins()">
            <p style="font-size: 0.85rem; font-weight: 700; color: var(--primary); margin: 10px 0;">Receive: <span id="coin-res">0</span> BUSD</p>
            <button class="btn-action" onclick="showPayment()">NEXT: PAY VIA UPI</button>
        </div>
        <div id="step-2" class="card" style="display: none; text-align: center;">
            <div class="qr-placeholder"><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=YOUR_UPI@ID" style="width:100%;"></div>
            <input type="text" id="utr-number" placeholder="Enter 12-Digit UTR Number">
            <button class="btn-action" style="background: var(--gold);" onclick="finishOrder()">SUBMIT FOR VERIFICATION</button>
        </div>
    </main>

    <main id="scan-page" class="page-section">
        <h2 style="color: var(--primary); margin-bottom: 20px;">Protocol Scanner</h2>
        <div class="card"><p style="opacity: 0.5; font-size: 0.7rem;">BURNED</p><h1 style="color: #ff4d4d;">0.00 BUSD 🔥</h1></div>
    </main>

    <nav class="footer-tabs">
        <button id="tab-home" class="tab-btn active" onclick="switchPage('home-page')">🏠<br>Info</button>
        <button id="tab-p2p" class="tab-btn" onclick="switchPage('p2p-page')">🔄<br>Buy</button>
        <button id="tab-scan" class="tab-btn" onclick="switchPage('scan-page')">🔍<br>Scanner</button>
    </nav>

    <script>
        function switchPage(pId) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.getElementById(pId).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(pId === 'home-page') document.getElementById('tab-home').classList.add('active');
            if(pId === 'p2p-page') document.getElementById('tab-p2p').classList.add('active');
            if(pId === 'scan-page') document.getElementById('tab-scan').classList.add('active');
        }
        function calcCoins() {
            let inr = document.getElementById('inr-amt').value;
            document.getElementById('coin-res').innerText = inr ? Math.floor(inr / 0.90) : '0';
        }
        function showPayment() {
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
        }
        function finishOrder() {
            alert('✅ ORDER RECEIVED! BUSD TEAM is verifying.');
            location.reload();
        }
    </script>
</body>
</html>
