<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSD OTC - Buy with INR</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --navy: #000814; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: var(--navy); color: var(--white); text-align: center; padding: 20px; margin: 0; }
        .otc-card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid var(--gold); max-width: 400px; margin: 40px auto; box-shadow: 0 0 20px rgba(212,175,55,0.1); }
        .price-box { font-size: 1.4rem; color: var(--gold); margin-bottom: 20px; font-weight: 600; border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #001d3d; color: white; box-sizing: border-box; }
        .total-label { font-size: 1.1rem; color: #27ae60; font-weight: bold; margin: 10px 0; }
        .btn-pay { background: var(--gold); color: var(--navy); border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 1rem; transition: 0.3s; }
        .qr-section { margin-top: 25px; display: none; padding-top: 20px; border-top: 1px dashed var(--gold); }
        .qr-section img { width: 220px; border: 8px solid white; border-radius: 12px; margin: 15px 0; }
        .upi-id { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 5px; font-family: monospace; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1 style="color: var(--gold); margin-top: 30px;">BUSD OTC Desk 🇮🇳</h1>
    
    <div class="otc-card">
        <div class="price-box">1 BUSD = ₹0.90 INR</div>
        
        <form action="https://formspree.io/f/xpqolbbd" method="POST">
            
            <label style="font-size: 0.8rem; float: left;">Amount of BUSD:</label>
            <input type="number" name="BUSD_Amount" id="amount" placeholder="Min 100 BUSD" required oninput="calculate()">
            
            <div class="total-label" id="total-inr">Payable: ₹0.00</div>
            
            <label style="font-size: 0.8rem; float: left;">Arbitrum Wallet Address:</label>
            <input type="text" name="Wallet_Address" id="wallet" placeholder="0x..." required>

            <button type="button" class="btn-pay" id="pay-btn" onclick="showPayment()">Proceed to Payment</button>

            <div id="payment-step" class="qr-section">
                <p>Scan to Pay via UPI</p>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay?pa=bharatbusd@postbank%26pn=BharatUSD%26cu=INR" alt="UPI QR">
                
                <div class="upi-id">UPI ID: bharatbusd@postbank</div>
                
                <input type="text" name="UTR_Number" id="utr" placeholder="Enter 12 Digit UTR" required>
                
                <button type="submit" class="btn-pay" style="background: #27ae60; color: white;">Submit Transaction Proof</button>
            </div>
        </form>
    </div>

    <script>
        function calculate() {
            let amt = document.getElementById('amount').value;
            let total = amt * 0.90;
            document.getElementById('total-inr').innerText = "Payable: ₹" + total.toFixed(2);
        }
        function showPayment() {
            let wallet = document.getElementById('wallet').value;
            let amt = document.getElementById('amount').value;
            if(amt < 1 || wallet.length < 20) { alert("Please fill details correctly"); return; }
            document.getElementById('payment-step').style.display = "block";
            document.getElementById('pay-btn').style.display = "none";
        }
    </script>
</body>
</html>
