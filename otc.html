<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSD OTC - Buy with INR</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --navy: #000814; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: var(--navy); color: var(--white); text-align: center; padding: 20px; margin: 0; }
        .otc-card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid var(--gold); max-width: 400px; margin: 40px auto; }
        .price-box { font-size: 1.4rem; color: var(--gold); margin-bottom: 20px; font-weight: 600; border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #001d3d; color: white; box-sizing: border-box; }
        .total-label { font-size: 1.1rem; color: #27ae60; font-weight: bold; margin: 10px 0; }
        .btn-pay { background: var(--gold); color: var(--navy); border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 1rem; }
        .qr-section { margin-top: 25px; display: none; border-top: 1px dashed var(--gold); padding-top: 20px; }
        .qr-section img { width: 220px; border: 8px solid white; border-radius: 12px; margin: 15px 0; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-wa { background: #25D366; color: white; flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .btn-tg { background: #0088cc; color: white; flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1 style="color: var(--gold); margin-top: 30px;">BUSD OTC Desk 🇮🇳</h1>
    
    <div class="otc-card">
        <div class="price-box">1 BUSD = ₹0.90 INR</div>
        
        <input type="number" id="amount" placeholder="Min 100 BUSD" oninput="calculate()">
        <div class="total-label" id="total-inr">Payable: ₹0.00</div>
        
        <input type="text" id="wallet" placeholder="Your Wallet Address (0x...)">

        <button type="button" class="btn-pay" id="pay-btn" onclick="showPayment()">Proceed to Payment</button>

        <div id="payment-step" class="qr-section">
            <p>Scan to Pay via UPI</p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay?pa=bharatbusd@postbank%26pn=BharatUSD%26cu=INR" alt="UPI QR">
            <div style="font-size:0.8rem; background:rgba(255,255,255,0.1); padding:10px; border-radius:5px;">UPI ID: bharatbusd@postbank</div>
            
            <input type="text" id="utr" placeholder="Enter 12-Digit UTR Number">
            
            <p style="font-size: 0.8rem; color: var(--gold); margin-top: 15px;">Send details to Admin via:</p>
            <div class="btn-group">
                <button class="btn-wa" onclick="send('wa')">WhatsApp ✅</button>
                <button class="btn-tg" onclick="send('tg')">Telegram ✈️</button>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            let amt = document.getElementById('amount').value;
            document.getElementById('total-inr').innerText = "Payable: ₹" + (amt * 0.90).toFixed(2);
        }
        function showPayment() {
            if(document.getElementById('amount').value < 1 || document.getElementById('wallet').value.length < 20) {
                alert("Please enter a valid amount and wallet address."); return;
            }
            document.getElementById('payment-step').style.display = "block";
            document.getElementById('pay-btn').style.display = "none";
        }
        function send(platform) {
            let amt = document.getElementById('amount').value;
            let wallet = document.getElementById('wallet').value;
            let utr = document.getElementById('utr').value;
            let inr = (amt * 0.90).toFixed(2);

            if(utr.length < 1) { alert("Please enter UTR number after payment."); return; }

            let message = `🚀 *NEW BUSD ORDER*%0A%0A*Amount:* ${amt} BUSD%0A*Payable:* ₹${inr}%0A*Wallet:* ${wallet}%0A*UTR:* ${utr}%0A%0A_Please verify and release BUSD tokens._`;
            
            if(platform === 'wa') {
                // WhatsApp number updated to 919730698063
                window.open(`https://wa.me/919730698063?text=${message}`, '_blank');
            } else {
                // Telegram username remains @bharatusd
                window.open(`https://t.me/bharatusd?text=${message}`, '_blank');
            }
        }
    </script>
</body>
</html>
